name: SaaS Intelligence Daily Reporter

on:
  schedule:
    # Runs at 09:00 UTC (2:30 PM IST) every day
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit data/analyzed_companies.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run SaaS Intelligence Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -m src.main

      - name: Commit and Push Database Updates
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data/analyzed_companies.json
          # Commit only if there are updates in analyzed_companies.json
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Auto-update analyzed companies database [skip ci]"
            git push origin main
          else
            echo "No database changes detected."
          fi
